<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-27 «Vector» — infiltración telequinética</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { overflow: hidden; height: 100%; background: #1a1e26; }
      canvas { display: block; }
      #narrative-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
        background: rgba(15, 17, 22, 0.72);
        backdrop-filter: blur(6px);
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        color: #e8eaef;
        pointer-events: auto;
        cursor: pointer;
      }
      #narrative-overlay.visible { display: flex; }
      #narrative-overlay .panel {
        text-align: center;
        max-width: 24rem;
        padding: 1.75rem 1.5rem;
        border-radius: 12px;
        background: linear-gradient(165deg, #2a3140 0%, #1f242e 100%);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(170, 68, 255, 0.25);
      }
      #narrative-overlay h2 {
        font-size: 1.35rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #c9a8ff;
      }
      #narrative-overlay p.body {
        font-size: 0.95rem;
        line-height: 1.45;
        opacity: 0.88;
        margin-bottom: 1rem;
      }
      #narrative-overlay .hint {
        font-size: 0.82rem;
        opacity: 0.65;
        letter-spacing: 0.02em;
      }
      #narrative-overlay kbd {
        display: inline-block;
        padding: 0.12rem 0.45rem;
        border-radius: 4px;
        background: #141820;
        border: 1px solid #3d4452;
        font-size: 0.78rem;
        font-family: inherit;
      }
      #game-hud {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 5;
        pointer-events: none;
        text-align: right;
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        color: #e8eaef;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.65);
        max-width: min(22rem, 88vw);
      }
      #game-hud .hud-panel {
        display: inline-block;
        padding: 0.65rem 0.85rem;
        border-radius: 8px;
        background: rgba(22, 26, 34, 0.82);
        border: 1px solid rgba(170, 68, 255, 0.22);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
      }
      #hud-sector {
        font-size: 0.88rem;
        font-weight: 600;
        color: #c9a8ff;
        letter-spacing: 0.02em;
        line-height: 1.3;
      }
      #hud-progress {
        margin-top: 0.28rem;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9aa8bc;
      }
      #hud-phase {
        margin-top: 0.35rem;
        font-size: 0.72rem;
        color: #7cffb6;
        letter-spacing: 0.04em;
        min-height: 1.1em;
      }
      #hud-phase:empty {
        display: none;
      }
      #pause-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9;
        background: rgba(12, 14, 18, 0.55);
        backdrop-filter: blur(4px);
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        color: #e8eaef;
        pointer-events: auto;
        cursor: pointer;
      }
      #pause-overlay.visible { display: flex; }
      #pause-overlay .pause-panel {
        text-align: center;
        padding: 1.35rem 1.75rem;
        border-radius: 10px;
        background: rgba(30, 35, 44, 0.92);
        border: 1px solid rgba(124, 255, 182, 0.28);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      }
      #pause-overlay h2 {
        font-size: 1.2rem;
        font-weight: 600;
        color: #7cffb6;
        margin-bottom: 0.45rem;
      }
      #pause-overlay .hint {
        font-size: 0.82rem;
        opacity: 0.72;
      }
      #pause-overlay kbd {
        display: inline-block;
        padding: 0.1rem 0.4rem;
        border-radius: 4px;
        background: #141820;
        border: 1px solid #3d4452;
        font-size: 0.76rem;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="game-hud" aria-label="Estado de misión">
      <div class="hud-panel">
        <div id="hud-sector"></div>
        <div id="hud-progress"></div>
        <div id="hud-phase" aria-live="polite"></div>
      </div>
    </div>
    <div id="pause-overlay" aria-hidden="true">
      <div class="pause-panel">
        <h2>Pausa</h2>
        <p class="hint">Pulsa <kbd>Esc</kbd> o haz clic para continuar</p>
      </div>
    </div>
    <div id="narrative-overlay" aria-live="polite" aria-hidden="true">
      <div class="panel">
        <h2 id="narrative-title"></h2>
        <p id="narrative-body" class="body"></p>
        <p class="hint" id="narrative-hint"></p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
